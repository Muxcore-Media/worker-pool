name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          path: module
      - uses: actions/checkout@v4
        with:
          repository: Muxcore-Media/core
          path: core
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Lint
        working-directory: module
        run: |
          go mod edit -replace github.com/Muxcore-Media/core=../core
          go vet ./...
      - name: Test
        working-directory: module
        run: go test -race -count=1 -timeout 60s ./...
      - name: Build
        working-directory: module
        run: go build ./...
